name: 天翼云盘签到

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions uses UTC; this is 04:30 Asia/Shanghai.
    - cron: '30 20 * * *'

jobs:
  sign:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests rsa

      - name: Run script
        env:
          PYTHONIOENCODING: utf-8
          ty_username: ${{ secrets.TY_USERNAME }}
          ty_cookie: ${{ secrets.TY_COOKIE }}
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
        run: python tianyiyun.py
